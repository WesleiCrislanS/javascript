<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETRAN</title>
    <style>
        body {
            background-color:#476A6F;
            font: normal 20pt Arial;
            
        }
    </style>
</head>

<body>
    <h1>Sistema de Multas</h1>
    Velocidade do Carro: <input type="number" name="txtvel" id="txtvel"> Km/h
    <input type="button" value="Verificar" onclick="calcular()">
    <div id="res">

    </div>
    <script>
        function calcular() {
            var txtv = window.document.querySelector('input#txtvel')
            var res = window.document.querySelector('div#res')
            var vel = Number(txtv.value)
            res.innerHTML = `<p>Su a velocidade é de <strong>${vel} Km/h</strong></p>`
            if (vel > 60) {
                res.innerHTML = 'O limite da via é de 60Km/h'
                res.innerHTML += '<br>Você está <strong>MULTADO</strong> por excesso de velocidade</br>'
                res.innerHTML += 'Acesse o site do DETRAN para pagar sua multa, não atrase o pagamento!!</br>'
            } else {
                res.innerHTML += '<p>Não esqueça o cinto de segurança!</p>'
            }
        }
    </script>

</body>

</html>
