<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio do Ex009</title>
</head>

<body>
    <H1>Verificador de Nacionalidade</H1>
    <p>Digite de qual país você é:</p>
    <input type="text" name="txtp" id="txtp">
    <input type="button" value="verificar" onclick="verificar()">
    <div id="res">

    </div>
    <script>
        function verificar() {
            var txtp = window.document.querySelector ('input#txtp')
            var res = window.document.querySelector ('div#res')
            var pais = txtp.value.toUpperCase()
            res.innerHTML = `<p>Vivendo em <strong>${pais}</strong></p>`
            if (pais == 'Brasil') {
                res.innerHTML += '<p>Você é <strong>BRASILEIRO!</strong></p>'
            } else {
                res.innerHTML += '<p>Você é <strong>ESTRANGEIRO!</strong></p>'
            }
        }
    </script>
</body>

</html>
